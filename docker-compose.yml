services:
  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    env_file:
      - ./.env.production
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/api/health', timeout=3)\"",
        ]
      interval: 20s
      timeout: 5s
      retries: 5
      start_period: 20s

  web-build:
    build:
      context: ./web
      dockerfile: Dockerfile
      args:
        VITE_SUPABASE_URL: ${VITE_SUPABASE_URL:-}
        VITE_SUPABASE_ANON_KEY: ${VITE_SUPABASE_ANON_KEY:-}
    volumes:
      - web_dist:/out
    command: ["sh", "-c", "rm -rf /out/* && cp -r /opt/web-dist/. /out"]

  caddy:
    image: caddy:2.10-alpine
    depends_on:
      api:
        condition: service_healthy
    env_file:
      - ./.env.production
    environment:
      APP_HOSTNAMES: ${APP_HOSTNAMES:-localhost}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/Caddyfile:/etc/caddy/Caddyfile:ro
      - web_dist:/srv:ro
      - caddy_data:/data
      - caddy_config:/config
    restart: unless-stopped

volumes:
  web_dist:
  caddy_data:
  caddy_config:
