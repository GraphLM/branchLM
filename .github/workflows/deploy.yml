name: Deploy to Vultr

on:
  push:
    branches: ["main"]
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Configure SSH agent
        uses: webfactory/ssh-agent@v0.9.0
        with:
          ssh-private-key: ${{ secrets.VULTR_SSH_PRIVATE_KEY }}

      - name: Trust Vultr host key
        env:
          VULTR_HOST: ${{ secrets.VULTR_HOST }}
        run: |
          mkdir -p ~/.ssh
          ssh-keyscan -H "$VULTR_HOST" >> ~/.ssh/known_hosts

      - name: Deploy on Vultr VM
        env:
          VULTR_HOST: ${{ secrets.VULTR_HOST }}
          VULTR_USER: ${{ secrets.VULTR_USER }}
          VULTR_APP_DIR: ${{ secrets.VULTR_APP_DIR }}
        run: |
          ssh "$VULTR_USER@$VULTR_HOST" "set -euo pipefail; cd '$VULTR_APP_DIR'; git fetch origin; git checkout main; git pull --ff-only origin main; chmod +x deploy/deploy.sh; ./deploy/deploy.sh"

      - name: Smoke check API + web
        env:
          DEPLOY_HOST: ${{ secrets.DEPLOY_HOST }}
        run: |
          curl --fail --silent --show-error "https://$DEPLOY_HOST/api/health"
          curl --fail --silent --show-error "https://$DEPLOY_HOST/"
